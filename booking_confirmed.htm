<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Curated Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --void: #00000f;
  --deep: #020214;
  --panel: #050520;
  --cyan: #00f5ff;
  --cyan-dim: rgba(0,245,255,0.12);
  --cyan-glow: rgba(0,245,255,0.45);
  --magenta: #ff00aa;
  --mag-glow: rgba(255,0,170,0.45);
  --lime: #39ff14;
  --gold: #ffd700;
  --text: #c8e8f0;
  --muted: rgba(200,232,240,0.4);
  --border: rgba(0,245,255,0.18);
  --border-hot: rgba(0,245,255,0.55);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--void);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  cursor: crosshair;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── SCANLINES ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,245,255,0.012) 2px,
    rgba(0,245,255,0.012) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── GRID ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* ── PARTICLE CANVAS ── */
#particles {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

/* ── RADIAL GLOW CENTER ── */
.bg-glow {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 800px; height: 800px;
  border-radius: 50%;
  background: radial-gradient(
    circle,
    rgba(0,245,255,0.07) 0%,
    rgba(255,0,170,0.04) 35%,
    transparent 65%
  );
  pointer-events: none;
  z-index: 1;
  animation: breathe 5s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
  50% { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
}

/* ── NAV ── */
nav {
  position: relative;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.2rem 4vw;
  border-bottom: 1px solid var(--border);
  background: rgba(2,2,20,0.7);
  backdrop-filter: blur(20px);
}

nav::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), var(--cyan), transparent);
  animation: sweep 4s linear infinite;
  background-size: 300%;
}

@keyframes sweep {
  0% { background-position: 0% 0; }
  100% { background-position: 300% 0; }
}

.logo {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  text-decoration: none;
  color: var(--cyan);
  text-shadow: 0 0 20px var(--cyan-glow), 0 0 40px rgba(0,245,255,0.2);
}

.logo span { color: var(--magenta); text-shadow: 0 0 20px var(--mag-glow); }

.nav-status {
  font-family: 'Orbitron', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  color: var(--lime);
  text-shadow: 0 0 8px var(--lime);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.nav-status::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--lime);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--lime);
  animation: blink 1.2s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* ── MAIN CONTENT ── */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 10;
  padding: 2rem 4vw;
}

.ty-container {
  text-align: center;
  max-width: 720px;
  width: 100%;
}

/* ── SUCCESS ICON ── */
.success-ring {
  position: relative;
  width: 120px; height: 120px;
  margin: 0 auto 2.5rem;
  animation: popIn 0.6s cubic-bezier(0.175,0.885,0.32,1.275) both;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.4); }
  to { opacity: 1; transform: scale(1); }
}

.ring-outer {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid var(--cyan);
  box-shadow: 0 0 30px var(--cyan-glow), inset 0 0 30px rgba(0,245,255,0.06);
  animation: ringPulse 2.5s ease-in-out infinite;
}

@keyframes ringPulse {
  0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 30px var(--cyan-glow), inset 0 0 30px rgba(0,245,255,0.06); }
  50% { transform: scale(1.06); opacity: 0.8; box-shadow: 0 0 50px var(--cyan-glow), inset 0 0 50px rgba(0,245,255,0.1); }
}

.ring-inner {
  position: absolute;
  inset: 12px;
  border-radius: 50%;
  border: 1px solid rgba(0,245,255,0.3);
  animation: ringPulse 2.5s ease-in-out 0.3s infinite;
}

.ring-icon {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Animated checkmark SVG */
.check-svg { width: 52px; height: 52px; }

.check-circle {
  fill: none;
  stroke: var(--cyan);
  stroke-width: 2;
  stroke-dasharray: 150;
  stroke-dashoffset: 150;
  animation: drawCircle 0.8s 0.3s ease forwards;
}

@keyframes drawCircle {
  to { stroke-dashoffset: 0; }
}

.check-mark {
  fill: none;
  stroke: var(--cyan);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 50;
  stroke-dashoffset: 50;
  animation: drawCheck 0.5s 1s ease forwards;
  filter: drop-shadow(0 0 6px var(--cyan));
}

@keyframes drawCheck {
  to { stroke-dashoffset: 0; }
}

/* Corner orbit dots */
.orbit-dot {
  position: absolute;
  width: 8px; height: 8px;
  background: var(--magenta);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--mag-glow);
  animation: orbit 4s linear infinite;
  transform-origin: 60px 60px;
}

.orbit-dot:nth-child(2) { animation-delay: -2s; background: var(--cyan); box-shadow: 0 0 10px var(--cyan-glow); }

@keyframes orbit {
  from { transform: rotate(0deg) translateX(60px) rotate(0deg); }
  to { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
}

/* ── TYPOGRAPHY ── */
.ty-eyebrow {
  font-family: 'Orbitron', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--lime);
  text-shadow: 0 0 10px var(--lime);
  margin-bottom: 1rem;
  animation: fadeUp 0.6s 0.4s ease both;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
}

.ty-eyebrow::before, .ty-eyebrow::after {
  content: '';
  width: 30px; height: 1px;
  background: var(--lime);
  box-shadow: 0 0 6px var(--lime);
}

.ty-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.8rem, 5vw, 3.4rem);
  font-weight: 900;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1.1;
  margin-bottom: 0.8rem;
  animation: fadeUp 0.6s 0.5s ease both;
}

.ty-title .cyan {
  color: var(--cyan);
  text-shadow: 0 0 30px var(--cyan-glow), 0 0 60px rgba(0,245,255,0.2);
}

.ty-title .mag {
  color: var(--magenta);
  text-shadow: 0 0 30px var(--mag-glow);
}

.ty-sub {
  font-size: 1rem;
  color: var(--muted);
  line-height: 1.7;
  max-width: 520px;
  margin: 0 auto 2.5rem;
  letter-spacing: 0.04em;
  animation: fadeUp 0.6s 0.6s ease both;
}

/* ── INFO CARDS ── */
.info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 2.5rem;
  animation: fadeUp 0.6s 0.7s ease both;
}

.info-card {
  background: var(--panel);
  padding: 1.4rem 1.2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: background 0.3s;
}

.info-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  transform: scaleX(0);
  transition: transform 0.4s;
}

.info-card:hover { background: rgba(0,245,255,0.04); }
.info-card:hover::before { transform: scaleX(1); }

.info-icon {
  font-size: 1.4rem;
  margin-bottom: 0.6rem;
  display: block;
}

.info-label {
  font-family: 'Orbitron', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.3rem;
}

.info-value {
  font-family: 'Orbitron', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan-glow);
  letter-spacing: 0.08em;
}

/* ── TIMELINE ── */
.timeline {
  text-align: left;
  margin-bottom: 2.5rem;
  border: 1px solid var(--border);
  background: var(--panel);
  animation: fadeUp 0.6s 0.8s ease both;
  position: relative;
  overflow: hidden;
}

.timeline::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--magenta), var(--cyan), var(--magenta));
  background-size: 200%;
  animation: shimmer 3s linear infinite;
}

@keyframes shimmer {
  0% { background-position: 0%; }
  100% { background-position: 200%; }
}

.timeline-header {
  padding: 0.8rem 1.4rem;
  border-bottom: 1px solid var(--border);
  font-family: 'Orbitron', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
}

.timeline-body { padding: 0.5rem 0; }

.tl-step {
  display: flex;
  align-items: center;
  gap: 1.2rem;
  padding: 0.85rem 1.4rem;
  border-bottom: 1px solid rgba(0,245,255,0.06);
  position: relative;
  transition: background 0.2s;
}

.tl-step:last-child { border-bottom: none; }
.tl-step:hover { background: rgba(0,245,255,0.03); }

.tl-indicator {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 0.65rem;
  font-family: 'Orbitron', monospace;
  font-weight: 700;
  position: relative;
}

.tl-done {
  background: rgba(57,255,20,0.15);
  border: 1px solid var(--lime);
  color: var(--lime);
  box-shadow: 0 0 10px rgba(57,255,20,0.3);
}

.tl-active {
  background: rgba(0,245,255,0.15);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  box-shadow: 0 0 10px var(--cyan-glow);
  animation: activePulse 1.5s infinite;
}

@keyframes activePulse {
  0%, 100% { box-shadow: 0 0 10px var(--cyan-glow); }
  50% { box-shadow: 0 0 20px var(--cyan-glow), 0 0 40px rgba(0,245,255,0.2); }
}

.tl-pending {
  background: rgba(200,232,240,0.04);
  border: 1px solid rgba(200,232,240,0.15);
  color: var(--muted);
}

.tl-info { flex: 1; }

.tl-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.2rem;
}

.tl-done-text .tl-title { color: var(--lime); }
.tl-active .tl-title-wrap .tl-title { color: var(--cyan); }
.tl-pending .tl-title-wrap .tl-title { color: var(--muted); }

.tl-step .title-active { color: var(--cyan); }
.tl-step .title-pending { color: var(--muted); }
.tl-step .title-done { color: var(--lime); }

.tl-desc { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.04em; }

.tl-time {
  font-family: 'Orbitron', monospace;
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  white-space: nowrap;
}

.tl-time.now { color: var(--cyan); text-shadow: 0 0 8px var(--cyan-glow); }

/* ── CTA BUTTONS ── */
.cta-row {
  display: flex;
  gap: 1rem;
  justify-content: center;
  animation: fadeUp 0.6s 0.9s ease both;
}

.btn-primary {
  font-family: 'Orbitron', monospace;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--void);
  background: var(--cyan);
  border: none;
  padding: 0.85rem 2rem;
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  box-shadow: 0 0 30px rgba(0,245,255,0.4);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.15);
  transform: translateX(-100%) skewX(-20deg);
  transition: transform 0.4s;
}

.btn-primary:hover::before { transform: translateX(150%) skewX(-20deg); }
.btn-primary:hover { background: var(--magenta); box-shadow: 0 0 40px var(--mag-glow); color: #fff; }

.btn-ghost {
  font-family: 'Orbitron', monospace;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cyan);
  background: transparent;
  border: 1px solid var(--border-hot);
  padding: 0.85rem 1.8rem;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  transition: all 0.2s;
  box-shadow: 0 0 15px rgba(0,245,255,0.1);
}

.btn-ghost:hover {
  background: var(--cyan-dim);
  box-shadow: 0 0 25px rgba(0,245,255,0.2);
}

/* ── FOOTER ── */
footer {
  position: relative;
  z-index: 100;
  border-top: 1px solid var(--border);
  background: rgba(2,2,20,0.8);
  backdrop-filter: blur(10px);
  padding: 1rem 4vw;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-copy {
  font-family: 'Orbitron', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.15em;
  color: rgba(200,232,240,0.18);
}

.footer-links { display: flex; gap: 1.5rem; list-style: none; }
.footer-links a {
  font-family: 'Orbitron', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(200,232,240,0.25);
  text-decoration: none;
  transition: color 0.2s;
}
.footer-links a:hover { color: var(--cyan); }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── TYPING CURSOR ── */
.typed-text::after {
  content: '|';
  color: var(--cyan);
  animation: cursor 0.8s step-end infinite;
}

@keyframes cursor {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .info-grid { grid-template-columns: 1fr; }
  .cta-row { flex-direction: column; align-items: center; }
  body { overflow-y: auto; }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-glow"></div>

<!-- NAV -->
<nav>
  <a href="#" class="logo">THE CURATED<span> DIGITAL</span></a>
     <div class="cta-row">
      <a href="the_curated_digital_home.htm" class="btn-primary">⬡ GO BACK HOME</a>
    </div>
</nav>
<!-- MAIN -->
<main>
  <div class="ty-container">
    <!-- Success Ring -->
    <div class="success-ring">
      <div class="orbit-dot"></div>
      <div class="orbit-dot"></div>
      <div class="ring-outer"></div>
      <div class="ring-inner"></div>
      <div class="ring-icon">
        <svg class="check-svg" viewBox="0 0 52 52">
          <circle class="check-circle" cx="26" cy="26" r="23"/>
          <polyline class="check-mark" points="14,27 22,35 38,18"/>
        </svg>
      </div>
    </div>
    <!-- Text -->
    <div class="ty-eyebrow">CONFIRMED</div>
    <h1 class="ty-title">
      BOOKING <span class="cyan">TRANSMITTED</span><br>
      <span class="mag">SUCCESSFULLY</span>
    </h1>
    <p class="ty-sub">
      Your strategy session request has been received and logged into our system. The Curated Digital operator will confirm your booking within <strong style="color:var(--cyan);">24 hours</strong> via email and WhatsApp.
    </p>
  </div>
</main>
<script>
/* ── PARTICLE SYSTEM ── */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const particles = [];
const COUNT = 60;

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4 - 0.1;
    this.size = Math.random() * 1.5 + 0.3;
    this.alpha = Math.random() * 0.5 + 0.1;
    this.color = Math.random() > 0.6 ? '0,245,255' : Math.random() > 0.5 ? '255,0,170' : '57,255,20';
    this.life = Math.random() * 200 + 100;
    this.age = 0;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.age++;
    if (this.age > this.life || this.y < -10) this.reset();
  }
  draw() {
    const fade = this.age < 20 ? this.age / 20 : this.age > this.life - 20 ? (this.life - this.age) / 20 : 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.color},${this.alpha * fade})`;
    ctx.fill();
  }
}

for (let i = 0; i < COUNT; i++) particles.push(new Particle());

/* Data stream lines */
const streams = [];
for (let i = 0; i < 8; i++) {
  streams.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    speed: Math.random() * 1.5 + 0.5,
    length: Math.random() * 80 + 30,
    alpha: Math.random() * 0.15 + 0.05,
    color: Math.random() > 0.5 ? '0,245,255' : '255,0,170'
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw streams
  streams.forEach(s => {
    ctx.beginPath();
    const grad = ctx.createLinearGradient(s.x, s.y - s.length, s.x, s.y);
    grad.addColorStop(0, `rgba(${s.color},0)`);
    grad.addColorStop(1, `rgba(${s.color},${s.alpha})`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1;
    ctx.moveTo(s.x, s.y - s.length);
    ctx.lineTo(s.x, s.y);
    ctx.stroke();
    s.y += s.speed;
    if (s.y > canvas.height + s.length) {
      s.y = -s.length;
      s.x = Math.random() * canvas.width;
    }
  });

  // Draw particles
  particles.forEach(p => { p.update(); p.draw(); });

  // Connect nearby particles
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 90) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(0,245,255,${0.06 * (1 - dist / 90)})`;
        ctx.lineWidth = 0.5;
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(animateParticles);
}

animateParticles();
</script>
</body>
</html>
